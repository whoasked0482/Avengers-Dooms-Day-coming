<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어벤져스:둠스데이 개봉 카운트다운</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay loop muted playsinline class="back-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-27513-large.mp4" type="video/mp4">
    </video>
  
    <!--이건뭐냐대체 / 지움-->

    <div class="countdown-container">
        <h1>AVENGERS: DOOMSDAY</h1>
        <p class="subtitle">개봉까지 남은 시간</p>

        <div class="countdown-box">
            <div class="time-section">
                <span id="days">00</span>
                <p>DAYS</p>
            </div>
            <div class="time-section">
                <span id="hours">00</span>
                <p>HOURS</p>
            </div>
            <div class="time-section">
                <span id="minutes">00</span>
                <p>MINS</p>
            </div>
            <div class="time-section">
                <span id="seconds">00</span>
                <p>SECS</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
